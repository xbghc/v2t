services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: backend
    depends_on:
      - redis
    # 仅绑 127.0.0.1：诊断接口（/api/diag/*）从 host 本机或 SSH 隧道访问，
    # 不走 nginx 8100，避免暴露到公网
    ports:
      - "127.0.0.1:8101:8101"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?请在 .env 中设置 ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      WHISPER_API_KEY: ${WHISPER_API_KEY:-}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_STT_MODEL: ${DASHSCOPE_STT_MODEL:-paraformer-realtime-v2}
      XIAZAITOOL_TOKEN: ${XIAZAITOOL_TOKEN:?请在 .env 中设置 XIAZAITOOL_TOKEN}
    volumes:
      - v2t-data:/data/v2t
      - v2t-tmp:/tmp/v2t
    restart: unless-stopped

  worker:
    build:
      context: .
      target: backend
    command: [".venv/bin/arq", "app.worker.WorkerSettings"]
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?请在 .env 中设置 ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      WHISPER_API_KEY: ${WHISPER_API_KEY:-}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_STT_MODEL: ${DASHSCOPE_STT_MODEL:-paraformer-realtime-v2}
      XIAZAITOOL_TOKEN: ${XIAZAITOOL_TOKEN:?请在 .env 中设置 XIAZAITOOL_TOKEN}
    volumes:
      - v2t-data:/data/v2t
      - v2t-tmp:/tmp/v2t
    restart: unless-stopped

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "8100:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  redis-data:
  v2t-data:
  v2t-tmp:
