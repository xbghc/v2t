server {
    listen 80;
    # docker 内嵌 DNS：让 nginx 在每次请求时动态解析 upstream，
    # 避免 web/worker 容器 recreate 后旧 IP 缓存导致 502
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 前端 SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存：避免用户看到指向旧 bundle 的 HTML
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate" always;
        expires 0;
    }

    # 带 hash 的静态资源可长期缓存（vite 已经文件名加 hash 做版本）
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 诊断接口仅供内部使用（host 内通过 127.0.0.1:8101 直连），
    # 公网走 nginx 这边一律 404，避免任何地方意外暴露
    location ^~ /api/diag {
        return 404;
    }

    # API 反代
    location /api/ {
        # upstream 写成变量 + resolver 触发动态解析
        set $upstream_web http://web:8101;
        proxy_pass $upstream_web;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
