[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 默认串行：当前 47 unit + 1 smoke ≈ 11s，xdist 多进程的 import 启动开销反而更慢；
# 测试规模长大后可考虑 `-n auto`，或在命令行临时 `pytest -n auto`。
markers =
    external: tests that require external network services (real API keys, etc.)
